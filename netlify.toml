# Netlify configuration for cris.sh

[build]
  command = "npm run build"
  publish = ".next"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking - allow only same-origin framing
    X-Frame-Options = "SAMEORIGIN"
    
    # Control referrer information sent with requests
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Disable specific browser features not needed by the site
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    
    # Content Security Policy
    # Allows: self, Next.js inline scripts, PostHog analytics, YouTube/Vimeo embeds, common image sources
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://us.i.posthog.com https://*.posthog.com;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https: http:;
      font-src 'self' data:;
      connect-src 'self' https://us.i.posthog.com https://*.posthog.com https://vitals.vercel-insights.com;
      media-src 'self' https://player.vimeo.com https://*.vimeo.com https://*.vimeocdn.com;
      frame-src 'self' https://www.youtube.com https://youtube.com https://player.vimeo.com https://calendly.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'self';
      upgrade-insecure-requests;
    """
